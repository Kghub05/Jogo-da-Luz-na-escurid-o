```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luz na Escuridão: Câmera Dinâmica</title>
    <style>
        :root {
            --ui-blue: #00d2ff;
            --ui-bg: rgba(0, 10, 20, 0.8);
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white; user-select: none; touch-action: none;
        }
        canvas { display: block; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        .hud-element {
            position: absolute; padding: 8px 16px;
            background: var(--ui-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; backdrop-filter: blur(8px);
            font-weight: bold;
        }

        #level-info { top: 20px; left: 20px; border-left: 4px solid var(--ui-blue); }
        #score-container { top: 20px; right: 20px; }
        
        #energy-container {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%); width: 60%; max-width: 300px;
            height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }
        #energy-bar { height: 100%; width: 100%; background: #00d2ff; transition: width 0.2s; }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: rgba(0,0,0,0.85);
            pointer-events: auto; z-index: 100; text-align: center;
        }

        .hidden { display: none !important; }

        h1 { font-size: 2.2rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
        .btn {
            padding: 12px 35px; border-radius: 5px; border: 2px solid white;
            background: transparent; color: white; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: 0.3s;
        }
        .btn:active { background: white; color: black; }
        
        #joystick-area {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; pointer-events: none;
        }
        #joystick-base {
            width: 100%; height: 100%; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%;
            width: 45px; height: 45px; margin: -22.5px 0 0 -22.5px;
            background: white; border-radius: 50%; box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="level-info" class="hud-element">
            <div id="level-name" style="color: var(--ui-blue);">Vazio Primal</div>
        </div>
        <div id="score-container" class="hud-element">
            <span id="score-val">0</span>
        </div>
        <div id="energy-container">
            <div id="energy-bar"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="joystick-area">
        <div id="joystick-base"></div>
        <div id="joystick-knob"></div>
    </div>

    <div id="menu" class="overlay">
        <h1>LUZ NA ESCURIDÃO</h1>
        <p style="margin-bottom: 2rem; opacity: 0.7;">Arraste para mover a luz.</p>
        <button class="btn" onclick="initGame()">INICIAR</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color: #ff3366;">A LUZ APAGOU</h1>
        <p id="final-stats" style="margin-bottom: 2rem;"></p>
        <button class="btn" onclick="initGame()">TENTAR NOVAMENTE</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelNameDisplay = document.getElementById('level-name');
        const scoreDisplay = document.getElementById('score-val');
        const energyBar = document.getElementById('energy-bar');

        const BIOMES = [
            { name: "Vazio Primal", color: "#00d2ff", bg: "#00050a", enemySpeed: 1.0, spawnRate: 0.005, drain: 0.03 },
            { name: "Nebulosa Carmesim", color: "#ff0055", bg: "#0a0002", enemySpeed: 1.8, spawnRate: 0.015, drain: 0.05 },
            { name: "Núcleo Estelar", color: "#ffee00", bg: "#0a0a00", enemySpeed: 2.5, spawnRate: 0.03, drain: 0.08 },
            { name: "Abismo Quântico", color: "#ffffff", bg: "#050505", enemySpeed: 3.5, spawnRate: 0.05, drain: 0.12 }
        ];

        let state = {
            active: false,
            score: 0,
            level: 0,
            energy: 100,
            player: { x: 0, y: 0, r: 14, light: 180 },
            camera: { x: 0, y: 0 },
            enemies: [],
            pickups: [],
            particles: [],
            stars: [],
            joy: { active: false, originX: 0, originY: 0, angle: 0, dist: 0 }
        };

        // Gerador de estrelas fixas no espaço (paralaxe)
        function generateStars() {
            state.stars = [];
            for(let i=0; i<300; i++) {
                state.stars.push({
                    x: Math.random() * 2000 - 1000,
                    y: Math.random() * 2000 - 1000,
                    size: Math.random() * 2,
                    brightness: Math.random()
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Controles Joystick com área de detecção
        window.addEventListener('touchstart', e => {
            const t = e.touches[0];
            state.joy.active = true;
            state.joy.originX = t.clientX;
            state.joy.originY = t.clientY;
        }, {passive: false});

        window.addEventListener('touchmove', e => {
            if(!state.joy.active) return;
            e.preventDefault();
            const t = e.touches[0];
            const dx = t.clientX - state.joy.originX;
            const dy = t.clientY - state.joy.originY;
            state.joy.dist = Math.min(Math.hypot(dx, dy), 50);
            state.joy.angle = Math.atan2(dy, dx);
            
            const knob = document.getElementById('joystick-knob');
            knob.style.transform = `translate(${Math.cos(state.joy.angle)*state.joy.dist}px, ${Math.sin(state.joy.angle)*state.joy.dist}px)`;
        }, {passive: false});

        window.addEventListener('touchend', () => {
            state.joy.active = false;
            state.joy.dist = 0;
            document.getElementById('joystick-knob').style.transform = `translate(0,0)`;
        });

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) {
                state.particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*6, 
                    vy: (Math.random()-0.5)*6, 
                    life: 1.0, 
                    color
                });
            }
        }

        function initGame() {
            state.active = true;
            state.score = 0;
            state.level = 0;
            state.energy = 100;
            state.player.x = 0;
            state.player.y = 0;
            state.camera.x = 0;
            state.camera.y = 0;
            state.enemies = [];
            state.pickups = [];
            state.particles = [];
            generateStars();
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            levelNameDisplay.innerText = BIOMES[0].name;
            levelNameDisplay.style.color = BIOMES[0].color;
            requestAnimationFrame(loop);
        }

        function update() {
            if(!state.active) return;

            const biome = BIOMES[state.level];

            // Subir de nível (Dificuldade por bioma)
            const nextLevel = Math.min(Math.floor(state.score / 2000), BIOMES.length - 1);
            if(nextLevel > state.level) {
                state.level = nextLevel;
                levelNameDisplay.innerText = biome.name;
                levelNameDisplay.style.color = biome.color;
                createExplosion(state.player.x, state.player.y, "#ffffff");
            }

            // Movimento do Jogador (Mundo Infinito)
            if(state.joy.active) {
                state.player.x += Math.cos(state.joy.angle) * (state.joy.dist/50) * 4.5;
                state.player.y += Math.sin(state.joy.angle) * (state.joy.dist/50) * 4.5;
            }

            // Câmera segue o jogador suavemente
            state.camera.x += (state.player.x - state.camera.x) * 0.1;
            state.camera.y += (state.player.y - state.camera.y) * 0.1;

            // Status
            state.energy -= biome.drain;
            state.score += 1;
            scoreDisplay.innerText = Math.floor(state.score/10);
            energyBar.style.width = state.energy + "%";
            energyBar.style.backgroundColor = state.energy < 30 ? "#ff3366" : biome.color;

            if(state.energy <= 0) {
                state.active = false;
                document.getElementById('game-over').classList.remove('hidden');
                document.getElementById('final-stats').innerText = `Pontos: ${Math.floor(state.score/10)} | Bioma: ${biome.name}`;
            }

            // Spawn inimigos em relação ao jogador (fora da câmera)
            if(Math.random() < biome.spawnRate) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(canvas.width, canvas.height) * 0.7;
                state.enemies.push({
                    x: state.player.x + Math.cos(angle) * dist,
                    y: state.player.y + Math.sin(angle) * dist,
                    r: 10 + Math.random() * 8
                });
            }

            // Spawn coletáveis
            if(Math.random() < 0.03) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 400;
                state.pickups.push({
                    x: state.player.x + Math.cos(angle) * dist,
                    y: state.player.y + Math.sin(angle) * dist,
                    pulse: 0
                });
            }

            // Lógica de Entidades
            state.enemies.forEach((e, i) => {
                const angle = Math.atan2(state.player.y - e.y, state.player.x - e.x);
                e.x += Math.cos(angle) * biome.enemySpeed;
                e.y += Math.sin(angle) * biome.enemySpeed;

                const d = Math.hypot(e.x - state.player.x, e.y - state.player.y);
                if(d < e.r + state.player.r) {
                    state.energy -= 15;
                    createExplosion(state.player.x, state.player.y, "#ff3366");
                    state.enemies.splice(i, 1);
                }
                // Limpeza de inimigos muito distantes
                if(d > 1500) state.enemies.splice(i, 1);
            });

            state.pickups.forEach((p, i) => {
                p.pulse += 0.1;
                const d = Math.hypot(p.x - state.player.x, p.y - state.player.y);
                if(d < 25) {
                    state.energy = Math.min(100, state.energy + 12);
                    createExplosion(p.x, p.y, biome.color);
                    state.pickups.splice(i, 1);
                }
                if(d > 1500) state.pickups.splice(i, 1);
            });

            state.particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) state.particles.splice(i, 1);
            });
        }

        function draw() {
            const biome = BIOMES[state.level];
            const camX = state.camera.x - canvas.width/2;
            const camY = state.camera.y - canvas.height/2;

            ctx.fillStyle = biome.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camX, -camY);

            // Estrelas de fundo (Paralaxe suave)
            state.stars.forEach(s => {
                const px = s.x + (camX * 0.8); // Estrela se move menos que a câmera
                const py = s.y + (camY * 0.8);
                // Repetir estrelas para infinito básico
                const finalX = ((px % 2000) + 2000) % 2000 - 1000 + state.camera.x;
                const finalY = ((py % 2000) + 2000) % 2000 - 1000 + state.camera.y;
                
                ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
                ctx.fillRect(finalX, finalY, s.size, s.size);
            });

            // Coletáveis (Fragmentos de Luz)
            state.pickups.forEach(p => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = biome.color;
                ctx.fillStyle = "#fff";
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5 + Math.sin(p.pulse)*2, 0, Math.PI*2);
                ctx.fill();
            });

            // Inimigos
            state.enemies.forEach(e => {
                const dist = Math.hypot(e.x - state.player.x, e.y - state.player.y);
                const visibility = Math.max(0, 1 - (dist / (state.player.light + 40)));
                ctx.globalAlpha = visibility;
                ctx.fillStyle = "#000";
                ctx.strokeStyle = biome.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
            });
            ctx.globalAlpha = 1;

            // Partículas
            state.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 2, 2);
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // Jogador
            const pg = ctx.createRadialGradient(state.player.x, state.player.y, 0, state.player.x, state.player.y, state.player.r);
            pg.addColorStop(0, '#fff');
            pg.addColorStop(1, biome.color);
            ctx.shadowBlur = 20;
            ctx.shadowColor = biome.color;
            ctx.fillStyle = pg;
            ctx.beginPath();
            ctx.arc(state.player.x, state.player.y, state.player.r, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore();

            // MÁSCARA DE LUZ (Efeito Vignette Cinético)
            const lightRad = state.player.light * (0.8 + (state.energy/100)*0.2) + Math.sin(Date.now()/150)*5;
            const lg = ctx.createRadialGradient(
                canvas.width/2 + (state.player.x - state.camera.x), 
                canvas.height/2 + (state.player.y - state.camera.y), 
                0,
                canvas.width/2 + (state.player.x - state.camera.x), 
                canvas.height/2 + (state.player.y - state.camera.y), 
                lightRad
            );
            lg.addColorStop(0, 'rgba(0,0,0,0)');
            lg.addColorStop(0.5, 'rgba(0,0,0,0.2)');
            lg.addColorStop(1, 'rgba(0,0,0,0.97)');

            ctx.fillStyle = lg;
            ctx.fillRect(0,0,canvas.width, canvas.height);
        }

        function loop() {
            update();
            draw();
            if(state.active) requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
